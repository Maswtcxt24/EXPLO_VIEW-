<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <title>ExploView — Your Life, Engineered</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }

    /* ── Scroll fix: never lock height ── */
    html { overflow-y: scroll; }

    body {
      font-family: 'Inter', sans-serif;
      background: #080b14;
      color: #e2e8f0;
      min-height: 100vh;
    }

    /* Light mode */
    body.light { background: #f1f5f9; color: #0f172a; }
    body.light .glass { background: rgba(255,255,255,0.85) !important; border-color: #e2e8f0 !important; }
    body.light aside { background: #ffffff; border-color: #e2e8f0; }
    body.light header { background: rgba(241,245,249,0.9); border-color: #e2e8f0; }
    body.light #mobileNav { background: #ffffff; border-color: #e2e8f0; }
    body.light .bg-slate-900\/60 { background: rgba(241,245,249,0.8) !important; }
    body.light input, body.light textarea { background: #f8fafc !important; border-color: #cbd5e1 !important; color: #0f172a !important; }
    body.light .text-slate-400 { color: #64748b !important; }

    .glass {
      backdrop-filter: blur(16px);
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
    }

    /* Sidebar */
    aside {
      width: 240px;
      height: 100vh;
      position: sticky;
      top: 0;
      flex-shrink: 0;
      background: #0d1120;
      border-right: 1px solid #1e2538;
      display: flex;
      flex-direction: column;
      padding: 16px;
      transition: transform 0.25s ease;
      z-index: 50;
    }

    /* Mobile sidebar overlay */
    #sideOverlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 49;
    }

    @media (max-width: 767px) {
      aside {
        position: fixed;
        top: 0; left: 0; bottom: 0;
        transform: translateX(-100%);
      }
      aside.open { transform: translateX(0); }
      #sideOverlay.open { display: block; }
    }

    nav button {
      width: 100%;
      text-align: left;
      padding: 9px 12px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 0.875rem;
      color: #94a3b8;
      transition: all 0.15s;
      border: none;
      background: none;
      cursor: pointer;
    }
    nav button:hover { background: rgba(255,255,255,0.06); color: #e2e8f0; }
    nav button.active { background: rgba(6,182,212,0.12); color: #22d3ee; font-weight: 600; }

    /* Main layout */
    #app { display: flex; }

    main { flex: 1; min-width: 0; }

    /* Sticky header */
    header {
      position: sticky;
      top: 0;
      z-index: 40;
      background: rgba(8,11,20,0.85);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid #1e2538;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    /* Content area — bottom padding so mobile nav doesn't cover it */
    #content {
      padding: 20px 16px 100px;
      max-width: 1100px;
      margin: 0 auto;
    }
    @media (min-width: 768px) {
      #content { padding: 24px 24px 40px; }
    }

    /* Cards */
    .card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 16px;
    }
    .card h3 {
      font-weight: 600;
      font-size: 0.9rem;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 12px;
    }

    /* Stat cards */
    .stat-val {
      font-size: 2rem;
      font-weight: 700;
      line-height: 1;
    }
    .stat-sub { font-size: 0.8rem; color: #64748b; margin-top: 4px; }

    /* Grid helpers */
    .grid-3 { display: grid; grid-template-columns: repeat(3,1fr); gap: 12px; }
    .grid-2 { display: grid; grid-template-columns: repeat(2,1fr); gap: 12px; }
    @media (max-width: 640px) {
      .grid-3 { grid-template-columns: 1fr; }
      .grid-2 { grid-template-columns: 1fr; }
    }
    @media (min-width: 641px) and (max-width: 900px) {
      .grid-3 { grid-template-columns: repeat(2,1fr); }
    }

    .space-y > * + * { margin-top: 12px; }

    /* Progress bar */
    .prog-track { height: 6px; background: #1e2538; border-radius: 3px; overflow: hidden; }
    .prog-fill  { height: 6px; border-radius: 3px; transition: width 0.4s ease; }

    /* Input / button base */
    input[type="text"], input[type="number"], input[type="time"], textarea, select {
      background: #0d1120;
      border: 1px solid #1e2538;
      border-radius: 10px;
      color: #e2e8f0;
      padding: 9px 12px;
      font-size: 0.875rem;
      font-family: inherit;
      outline: none;
      transition: border-color 0.15s;
      width: 100%;
    }
    input:focus, textarea:focus, select:focus { border-color: #06b6d4; }

    .btn {
      padding: 9px 18px;
      border-radius: 10px;
      font-weight: 600;
      font-size: 0.8rem;
      border: none;
      cursor: pointer;
      transition: all 0.15s;
      font-family: inherit;
      white-space: nowrap;
    }
    .btn-primary { background: #06b6d4; color: #080b14; }
    .btn-primary:hover { background: #22d3ee; }
    .btn-ghost { background: rgba(255,255,255,0.06); color: #94a3b8; border: 1px solid #1e2538; }
    .btn-ghost:hover { background: rgba(255,255,255,0.1); color: #e2e8f0; }
    .btn-danger { background: rgba(239,68,68,0.1); color: #f87171; border: 1px solid rgba(239,68,68,0.2); }
    .btn-danger:hover { background: rgba(239,68,68,0.2); }
    .btn-sm { padding: 5px 10px; font-size: 0.72rem; }

    /* Tags */
    .tag {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 6px;
      font-size: 0.7rem;
      font-weight: 600;
    }
    .tag-high { background: rgba(239,68,68,0.15); color: #f87171; }
    .tag-med  { background: rgba(234,179,8,0.15); color: #fbbf24; }
    .tag-low  { background: rgba(34,197,94,0.15); color: #4ade80; }

    /* Task row */
    .task-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      background: rgba(255,255,255,0.03);
      border: 1px solid #1e2538;
      border-radius: 10px;
      transition: border-color 0.15s;
    }
    .task-row:hover { border-color: #2e3a55; }
    .task-row.done span.title { text-decoration: line-through; color: #475569; }

    input[type="checkbox"] {
      width: 16px; height: 16px;
      accent-color: #06b6d4;
      cursor: pointer;
      flex-shrink: 0;
    }

    /* Mobile bottom nav */
    #mobileNav {
      display: none;
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: #0d1120;
      border-top: 1px solid #1e2538;
      z-index: 48;
      padding: 6px 0 8px;
    }
    @media (max-width: 767px) {
      #mobileNav { display: flex; justify-content: space-around; }
    }
    #mobileNav button {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      padding: 4px 8px;
      background: none;
      border: none;
      color: #475569;
      font-size: 0.62rem;
      cursor: pointer;
      transition: color 0.15s;
    }
    #mobileNav button.active { color: #22d3ee; }
    #mobileNav button span.ico { font-size: 1.2rem; }

    /* Habit streak */
    .habit-card {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 12px;
      background: rgba(255,255,255,0.03);
      border: 1px solid #1e2538;
      border-radius: 10px;
    }

    /* AI output */
    #studyOut {
      margin-top: 14px;
      padding: 14px;
      background: rgba(6,182,212,0.05);
      border: 1px solid rgba(6,182,212,0.15);
      border-radius: 12px;
      font-size: 0.875rem;
      line-height: 1.7;
      white-space: pre-wrap;
      min-height: 40px;
    }

    /* Loading spinner */
    .spinner {
      display: inline-block;
      width: 18px; height: 18px;
      border: 2px solid rgba(6,182,212,0.3);
      border-top-color: #06b6d4;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #1e2538; border-radius: 3px; }
  </style>
</head>
<body>

<!-- Sidebar overlay for mobile -->
<div id="sideOverlay" onclick="closeSidebar()"></div>

<div id="app">

  <!-- Sidebar -->
  <aside id="sidebar">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:20px;padding:4px 0">
      <div style="width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,#06b6d4,#7c3aed);display:grid;place-items:center;font-weight:700;font-size:0.85rem;flex-shrink:0">EV</div>
      <div>
        <div style="font-weight:700;font-size:0.95rem">ExploView</div>
        <div style="font-size:0.68rem;color:#475569">Your Life, Engineered</div>
      </div>
    </div>

    <nav id="nav"></nav>

    <div style="margin-top:auto;font-size:0.68rem;color:#334155;line-height:1.6;padding-top:16px">
      Founded by Shayne Mwanza &amp; Abdullah Mian<br>Lusaka, Zambia © 2026
    </div>
  </aside>

  <!-- Main -->
  <main>

    <header>
      <button id="menuBtn" onclick="openSidebar()" style="display:none;padding:8px;border-radius:8px;background:rgba(255,255,255,0.06);border:1px solid #1e2538;color:#94a3b8;cursor:pointer;font-size:1rem">☰</button>

      <div style="font-weight:600;font-size:0.95rem" id="pageTitle">Dashboard</div>

      <div style="margin-left:auto;display:flex;gap:8px;align-items:center">
        <button onclick="toggleTheme()" class="btn btn-ghost btn-sm">☀ Theme</button>
        <button id="installBtn" class="btn btn-primary btn-sm">Install</button>
      </div>
    </header>

    <div id="content"></div>

  </main>
</div>

<!-- Mobile bottom nav -->
<div id="mobileNav"></div>

<script>
/* ───────────────────────────────────────────
   STORE
─────────────────────────────────────────── */
const store = {
  get(k, d) {
    try { return JSON.parse(localStorage.getItem(k)) ?? d; }
    catch { return d; }
  },
  set(k, v) { localStorage.setItem(k, JSON.stringify(v)); }
};

/* Seed data */
if (!localStorage.getItem('ev2_init')) {
  store.set('profile', { name: 'Abdullah', focus: ['Study','Money','Health'] });
  store.set('goals', [
    { id: 1, title: 'Finish Exam Prep', progress: 40, category: 'School' },
    { id: 2, title: 'Save PKR 10,000', progress: 20, category: 'Money' }
  ]);
  store.set('tasks', [
    { id: 1, title: 'Study Physics', done: false, priority: 'high', time: '09:00' },
    { id: 2, title: 'Read Chapter 5', done: false, priority: 'med', time: '11:00' }
  ]);
  store.set('money', {
    income:  [{ s: 'Freelancing', a: 5000 }],
    expense: [{ s: 'Food', a: 1200 }, { s: 'Transport', a: 400 }],
    savings: 5000
  });
  store.set('habits', [
    { id: 1, name: 'Deep Work', streak: 4 },
    { id: 2, name: 'Reading',   streak: 7 }
  ]);
  localStorage.setItem('ev2_init', '1');
}

/* ───────────────────────────────────────────
   NAV
─────────────────────────────────────────── */
const sections = [
  { id: 'dash',      label: 'Dashboard', icon: '🏠' },
  { id: 'planner',   label: 'Planner',   icon: '🗓️' },
  { id: 'goals',     label: 'Goals',     icon: '🎯' },
  { id: 'study',     label: 'Study AI',  icon: '📚' },
  { id: 'money',     label: 'Money',     icon: '💰' },
  { id: 'habits',    label: 'Habits',    icon: '🔥' },
  { id: 'analytics', label: 'Analytics', icon: '📊' },
  { id: 'settings',  label: 'Settings',  icon: '⚙️' }
];

let current = 'dash';

function renderNav() {
  document.getElementById('nav').innerHTML = sections.map(s => `
    <button data-goto="${s.id}" class="${s.id === current ? 'active' : ''}">
      <span>${s.icon}</span> ${s.label}
    </button>
  `).join('');

  document.getElementById('mobileNav').innerHTML = sections.map(s => `
    <button data-goto="${s.id}" class="${s.id === current ? 'active' : ''}">
      <span class="ico">${s.icon}</span>
      <span>${s.label.split(' ')[0]}</span>
    </button>
  `).join('');

  document.querySelectorAll('[data-goto]').forEach(btn => {
    btn.onclick = () => { goto(btn.dataset.goto); closeSidebar(); };
  });
}

function goto(id) {
  current = id;
  document.getElementById('pageTitle').textContent = sections.find(s => s.id === id).label;
  renderNav();
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

/* ───────────────────────────────────────────
   SIDEBAR (mobile)
─────────────────────────────────────────── */
function openSidebar() {
  document.getElementById('sidebar').classList.add('open');
  document.getElementById('sideOverlay').classList.add('open');
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sideOverlay').classList.remove('open');
}

/* Show menu button on mobile */
function checkMobile() {
  document.getElementById('menuBtn').style.display =
    window.innerWidth < 768 ? 'block' : 'none';
}
window.addEventListener('resize', checkMobile);
checkMobile();

/* ───────────────────────────────────────────
   CHART manager — prevents duplicate chart crash
─────────────────────────────────────────── */
const charts = {};
function makeChart(id, config) {
  if (charts[id]) { charts[id].destroy(); delete charts[id]; }
  const ctx = document.getElementById(id);
  if (!ctx) return;
  charts[id] = new Chart(ctx, config);
}

/* ───────────────────────────────────────────
   RENDER
─────────────────────────────────────────── */
function render() {
  const c   = document.getElementById('content');
  const pro = store.get('profile', { name: 'User' });

  /* ── DASHBOARD ── */
  if (current === 'dash') {
    const tasks  = store.get('tasks', []);
    const goals  = store.get('goals', []);
    const money  = store.get('money', {});
    const habits = store.get('habits', []);
    const bal    = (money.income||[]).reduce((a,b)=>a+b.a,0)
                 - (money.expense||[]).reduce((a,b)=>a+b.a,0);

    c.innerHTML = `
      <div class="grid-3 space-y" style="margin-bottom:12px">
        <div class="card">
          <h3>Welcome</h3>
          <div class="stat-val" style="font-size:1.5rem">Hi ${pro.name} 👋</div>
          <div class="stat-sub">${new Date().toDateString()}</div>
        </div>
        <div class="card">
          <h3>Tasks Left</h3>
          <div class="stat-val" style="color:#22d3ee">${tasks.filter(t=>!t.done).length}</div>
          <div class="stat-sub">of ${tasks.length} total</div>
        </div>
        <div class="card">
          <h3>Balance</h3>
          <div class="stat-val" style="color:#4ade80">PKR ${bal.toLocaleString()}</div>
          <div class="stat-sub">net this month</div>
        </div>
      </div>

      <div class="grid-2" style="margin-bottom:12px">
        <div class="card">
          <h3>Goals</h3>
          ${goals.map(g=>`
            <div style="margin-bottom:12px">
              <div style="display:flex;justify-content:space-between;font-size:0.85rem;margin-bottom:5px">
                <span>${g.title}</span>
                <span style="color:#22d3ee;font-weight:600">${g.progress}%</span>
              </div>
              <div class="prog-track">
                <div class="prog-fill" style="width:${g.progress}%;background:linear-gradient(90deg,#06b6d4,#7c3aed)"></div>
              </div>
            </div>
          `).join('')}
        </div>
        <div class="card">
          <h3>Quick Add Task</h3>
          <div style="display:flex;flex-direction:column;gap:8px">
            <input type="text" id="qa" placeholder="Task title...">
            <div style="display:flex;gap:8px">
              <select id="qpri" style="flex:1">
                <option value="high">High Priority</option>
                <option value="med" selected>Medium</option>
                <option value="low">Low</option>
              </select>
              <input type="time" id="qtime" value="09:00" style="flex:1">
            </div>
            <button class="btn btn-primary" onclick="addTask()">+ Add Task</button>
          </div>
        </div>
      </div>

      <div class="card">
        <h3>Habits</h3>
        <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:8px">
          ${habits.map(h=>`
            <div class="habit-card">
              <span style="font-size:0.85rem;font-weight:500">${h.name}</span>
              <span style="color:#f97316;font-weight:700;font-size:0.9rem">🔥 ${h.streak}</span>
            </div>
          `).join('')}
        </div>
      </div>
    `;
  }

  /* ── PLANNER ── */
  if (current === 'planner') {
    const tasks = store.get('tasks', []);
    const sorted = [...tasks].sort((a,b)=>a.time.localeCompare(b.time));

    c.innerHTML = `
      <div class="card">
        <h3>Today's Planner</h3>
        <div class="space-y">
          ${sorted.length ? sorted.map(t=>`
            <div class="task-row ${t.done?'done':''}">
              <input type="checkbox" ${t.done?'checked':''} onchange="toggleTask(${t.id})">
              <span class="title" style="flex:1;font-size:0.875rem">${t.time} — ${t.title}</span>
              <span class="tag tag-${t.priority}">${t.priority}</span>
              <button class="btn btn-danger btn-sm" onclick="deleteTask(${t.id})">✕</button>
            </div>
          `).join('') : '<div style="color:#475569;text-align:center;padding:20px">No tasks yet. Add one from Dashboard!</div>'}
        </div>
      </div>

      <div class="card" style="margin-top:12px">
        <h3>Add New Task</h3>
        <div style="display:flex;flex-direction:column;gap:8px">
          <input type="text" id="pt" placeholder="Task title...">
          <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px">
            <input type="time" id="ptime" value="09:00">
            <select id="ppri">
              <option value="high">High</option>
              <option value="med" selected>Medium</option>
              <option value="low">Low</option>
            </select>
            <button class="btn btn-primary" onclick="addTaskFull()">Add</button>
          </div>
        </div>
      </div>
    `;
  }

  /* ── GOALS ── */
  if (current === 'goals') {
    const goals = store.get('goals', []);

    c.innerHTML = `
      <div class="card" style="margin-bottom:12px">
        <h3>Add Goal</h3>
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          <input type="text" id="gtitle" placeholder="Goal title..." style="flex:1;min-width:160px">
          <select id="gcat" style="width:130px">
            <option>School</option><option>Money</option><option>Health</option><option>General</option>
          </select>
          <button class="btn btn-primary" onclick="addGoal()">+ Add</button>
        </div>
      </div>

      <div class="space-y">
        ${goals.map(g=>`
          <div class="card">
            <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:10px">
              <div>
                <div style="font-weight:600">${g.title}</div>
                <div style="font-size:0.72rem;color:#475569;margin-top:2px">${g.category}</div>
              </div>
              <div style="display:flex;align-items:center;gap:8px">
                <span style="color:#22d3ee;font-weight:700">${g.progress}%</span>
                <button class="btn btn-danger btn-sm" onclick="deleteGoal(${g.id})">✕</button>
              </div>
            </div>
            <div class="prog-track" style="margin-bottom:8px">
              <div class="prog-fill" style="width:${g.progress}%;backg
